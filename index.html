<div id="owner-view" style="display:none">
    <div id="sidebar">
        <div class="side-header">
            <img src="inverted-logo.svg" alt="Loadify" width="110">
            <div class="badge">LIVE: <span id="count">0</span></div>
        </div>
        <div id="fleet-list" class="scroll-box"></div>
    </div>

    <div id="main-dashboard">
        <div class="dashboard-row">
            <div class="panel col-25">
                <div class="panel-header">LIVE LOCATION</div>
                <div id="map"></div>
            </div>

            <div class="panel col-75">
                <div class="panel-header">REAL-TIME TELEMETRY & ENGINE STATUS</div>
                <div class="telemetry-grid">
                    <div class="stat-box">
                        <small>CURRENT SPEED</small>
                        <h2 id="live-speed">0 <span class="unit">KM/H</span></h2>
                    </div>
                    <div class="stat-box">
                        <small>SIGNAL HEALTH</small>
                        <h2 id="signal-health">--</h2>
                    </div>
                    <div class="stat-box">
                        <small>IDLE DURATION</small>
                        <h2 id="idle-time">0 <span class="unit">MIN</span></h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard-row">
            <div class="panel col-50">
                <div class="panel-header">SPEED INTENSITY (LAST 24 HOURS)</div>
                <div id="graph-container">
                    <div class="graph-bar-container" id="speed-bars"></div>
                </div>
            </div>

            <div class="panel col-50">
                <div class="panel-header">AI BUSINESS AUDIT (RANGE: 0-30 DAYS)</div>
                <div class="audit-controls">
                    <select id="audit-range">
                        <option value="1">24h Quick Pulse</option>
                        <option value="7" selected>7-Day Deep Audit</option>
                        <option value="30">30-Day Monthly Audit</option>
                    </select>
                    <button class="audit-btn" onclick="triggerDeepAudit()">GENERATE VERDICT</button>
                </div>
                <div id="ai-audit-output" class="audit-result">Select a vehicle to begin audit...</div>
            </div>
        </div>
    </div>
</div>
