<body class="bg-gray-100 font-sans text-gray-900">
    <div id="toast"></div>

    <div id="screen-login" class="screen active">
        <div class="login-wrap">
            <h1 class="login-title">Login</h1>
            <p class="login-sub">Enter your mobile number</p>
            <div class="phone-row">
                <span class="phone-cc">+91</span>
                <input type="tel" id="login-phone" placeholder="9874076688" maxlength="10" readonly>
            </div>
            <button id="role-owner" class="role-btn owner" onclick="setRole('owner')">I AM OWNER</button>
            <button id="role-driver" class="role-btn driver" onclick="setRole('driver')">I AM PILOT</button>
        </div>
        <div class="login-dash-link" onclick="processLogin()">Log in</div>
        <div class="numpad">
            <button class="numpad-btn" onclick="numpadInput('1')">1</button>
            <button class="numpad-btn" onclick="numpadInput('2')">2</button>
            <button class="numpad-btn" onclick="numpadInput('3')">3</button>
            <button class="numpad-btn" onclick="numpadInput('4')">4</button>
            <button class="numpad-btn" onclick="numpadInput('5')">5</button>
            <button class="numpad-btn" onclick="numpadInput('6')">6</button>
            <button class="numpad-btn" onclick="numpadInput('7')">7</button>
            <button class="numpad-btn" onclick="numpadInput('8')">8</button>
            <button class="numpad-btn" onclick="numpadInput('9')">9</button>
            <button class="numpad-btn" onclick="numpadInput('*')">* #</button>
            <button class="numpad-btn" onclick="numpadInput('0')">0</button>
            <button class="numpad-btn" onclick="numpadDelete()">⌫</button>
        </div>
    </div>

    <div id="screen-owner" class="screen">
        <div class="owner-header">
            <h1>LOADIFY INDIA CONTROL</h1>
            <div class="header-icons"><button class="notif-btn">🔔<span class="notif-badge">2</span></button></div>
        </div>
        <div class="stat-bar">
            <div class="stat-item"><div class="stat-val" id="stat-trucks">0</div><div class="stat-lbl">Trucks</div></div>
            <div class="stat-sep"></div>
            <div class="stat-item"><div class="stat-val green" id="stat-running">0 Running</div><div class="stat-lbl">Active</div></div>
            <div class="stat-sep"></div>
            <div class="stat-item"><div class="stat-val blue">₹18,200</div><div class="stat-lbl">Today</div></div>
        </div>
        <div id="map-owner"></div>
        <div class="truck-list" id="truck-list"></div>
        <button class="add-truck-btn" onclick="showScreen('add-truck')">+</button>
        </div>

    <div id="screen-driver" class="screen">
        <div class="driver-header"><h1>LOADIFY PILOT</h1></div>
        <div id="driver-waiting">
            <button class="start-trip-btn" id="start-btn" onclick="startTrip()">START TRIP</button>
        </div>
        <div id="driver-active" style="display:none">
            <div class="gps-bar"><div class="gps-dot-live"></div><span class="gps-text">GPS: TRANSMITTING LIVE</span></div>
            <div class="live-stats">
                <div class="ls-card"><div class="ls-val" id="live-speed">0</div><div class="ls-lbl">KM/H</div></div>
            </div>
            <button class="start-trip-btn active" onclick="finishTrip()">⏹ FINISH TRIP</button>
        </div>
    </div>

    <div id="screen-add-truck" class="screen">
        <div class="add-header">
            <button class="back-btn" onclick="showScreen('owner')">‹</button>
            <h2>Register Fleet</h2>
        </div>
        <div class="form-group"><label class="form-label">Truck Number</label><input class="form-input" id="new-truck" placeholder="WB26X0606"></div>
        <div class="form-group"><label class="form-label">Pilot Name</label><input class="form-input" id="new-driver" placeholder="Enter Name"></div>
        <div class="form-group"><label class="form-label">Pilot Mobile</label><input class="form-input" id="new-phone" type="tel" placeholder="9876543210"></div>
        <button class="whatsapp-btn" onclick="sendInvite()">💬 SEND WHATSAPP INVITE</button>
        <button class="save-fleet-btn" onclick="saveTruck()">SAVE PILOT & TRUCK</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API = 'https://loadifyindia.onrender.com';
        let selectedRole = 'driver';
        let ownerMap = null;
        let gpsWatchId = null;

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function setRole(r) {
            selectedRole = r;
            document.getElementById('role-owner').style.background = (r === 'owner' ? '#1e3a8a' : '#e8eaf0');
            document.getElementById('role-driver').style.background = (r === 'driver' ? '#1e3a8a' : '#e8eaf0');
        }

        function numpadInput(d) { document.getElementById('login-phone').value += d; }
        function numpadDelete() { const e = document.getElementById('login-phone'); e.value = e.value.slice(0, -1); }

        async function processLogin() {
            if (selectedRole === 'driver') { showScreen('driver'); }
            else {
                try {
                    const res = await fetch(`${API}/dashboard`);
                    const data = await res.json();
                    if (data.length === 0) showScreen('add-truck');
                    else { showScreen('owner'); initOwnerMap(); }
                } catch (e) { showScreen('add-truck'); }
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        function initOwnerMap() {
            if (ownerMap) return;
            ownerMap = L.map('map-owner', { zoomControl: false }).setView([22.5, 88.3], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(ownerMap);
            refreshFleet();
        }

        async function refreshFleet() {
            const res = await fetch(`${API}/dashboard`);
            const data = await res.json();
            document.getElementById('stat-trucks').textContent = data.length;
            document.getElementById('stat-running').textContent = data.filter(t => t.speed > 5).length + ' Running';
            
            const list = document.getElementById('truck-list');
            list.innerHTML = '';
            data.forEach(t => {
                list.innerHTML += `
                    <div class="truck-card">
                        <div class="tc-top"><span class="tc-name">${t.truck_id}</span>
                        <button class="tc-btn" onclick="window.location.href='tel:9874076688'">📞 CALL</button></div>
                        <div class="tc-status"><span class="${t.speed > 5 ? 'status-green' : 'status-red'}">● ${t.speed > 5 ? 'Moving' : 'Stopped'}</span></div>
                        <div class="tc-bottom"><span class="tc-trip">₹12,000 trip</span><span>${t.speed} km/h</span></div>
                    </div>`;
            });
        }

        function sendInvite() {
            const p = document.getElementById('new-phone').value;
            const t = document.getElementById('new-truck').value;
            window.open(`https://wa.me/91${p}?text=Loadify India Pilot Invite for ${t}. App: ${window.location.href}`);
        }

        function saveTruck() { toast('✅ Pilot Registered'); showScreen('owner'); initOwnerMap(); }

        function startTrip() {
            document.getElementById('driver-waiting').style.display = 'none';
            document.getElementById('driver-active').style.display = 'block';
            gpsWatchId = navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lng, speed } = pos.coords;
                const kmh = speed ? Math.round(speed * 3.6) : 0;
                document.getElementById('live-speed').textContent = kmh;
                fetch(`${API}/send-location`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ truck_id: 'WB26X0606', lat, lng, speed: kmh })
                });
            }, null, { enableHighAccuracy: true });
        }

        function finishTrip() { navigator.geolocation.clearWatch(gpsWatchId); location.reload(); }
    </script>
</body>
