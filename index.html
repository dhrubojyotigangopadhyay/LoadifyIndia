<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadify India</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gateway">
        <div class="login-box">
            <h1>LOADIFY INDIA</h1>
            
            <input type="tel" id="login-phone" placeholder="Enter Mobile Number">

            <div class="role-group">
                <button id="btn-owner" onclick="selectRole('owner')">I AM OWNER</button>
                <button id="btn-driver" onclick="selectRole('driver')">I AM DRIVER</button>
            </div>

            <button class="access-btn" onclick="appLogin()">ACCESS SYSTEM</button>
            <p id="err-msg"></p>
        </div>
    </div>

    <div id="owner-view" style="display:none">
        <div id="sidebar">
            <img src="inverted-logo.svg" width="100">
            <div id="fleet-list"></div>
        </div>
        <div id="main-dashboard">
            <div class="row">
                <div id="map" class="panel"></div>
                <div class="panel stats">
                    <small>LIVE SPEED</small>
                    <h2 id="live-speed">0 KM/H</h2>
                    <hr>
                    <small>SIGNAL</small>
                    <h2 id="signal-health">--</h2>
                </div>
            </div>
            <div class="row">
                <div class="panel ai-zone">
                    <select id="audit-range">
                        <option value="7">7 Days Report</option>
                        <option value="30">30 Days Report</option>
                    </select>
                    <button onclick="triggerDeepAudit()">GENERATE AI REPORT</button>
                    <div id="ai-audit-output">Report will appear here...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="driver-view" style="display:none">
        <div class="driver-screen">
            <h1 id="truck-display">WB26-X0606</h1>
            <button id="trip-btn" onclick="handleTrip()">START TRIP</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
