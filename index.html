<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadify India | Pilot Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .active-tab { color: #1e40af; border-top: 3px solid #1e40af; }
        #map-mobile { height: 250px; width: 100%; border-radius: 24px; z-index: 10; }
        .screen { display: none; min-height: 100vh; }
        .screen-active { display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <div id="screen-login" class="screen screen-active items-center justify-center p-6 bg-white">
        <h1 class="text-4xl font-black mb-2">Login</h1>
        <p class="text-gray-400 mb-10 text-lg font-bold">Enter mobile to access Pilot Network</p>
        <div class="w-full max-w-sm space-y-4">
            <div class="flex items-center border-2 rounded-2xl p-4 bg-gray-50">
                <span class="text-gray-400 font-bold mr-3">+91</span>
                <input type="tel" id="login-phone" class="w-full bg-transparent outline-none text-xl font-bold" placeholder="9874076688">
            </div>
            <div class="flex gap-3">
                <button onclick="setRole('owner')" id="role-owner" class="flex-1 p-4 rounded-xl border-2 font-black transition-all bg-blue-800 text-white border-blue-800">OWNER</button>
                <button onclick="setRole('driver')" id="role-driver" class="flex-1 p-4 rounded-xl border-2 font-black transition-all bg-gray-50 text-gray-400 border-gray-200">PILOT</button>
            </div>
            <button onclick="processLogin()" class="w-full py-5 text-blue-800 font-black text-2xl border-t mt-6">Log in</button>
        </div>
    </div>

    <div id="screen-onboarding" class="screen bg-white">
        <header class="p-5 flex items-center border-b shadow-sm">
            <button onclick="showScreen('login')" class="text-blue-800 text-2xl mr-4">←</button>
            <h2 class="text-2xl font-black italic">Register Fleet</h2>
        </header>
        <div class="p-8 space-y-6">
            <div><label class="text-gray-400 font-bold text-xs uppercase">Truck Number</label><input type="text" id="new-truck-id" placeholder="WB26-X0606" class="w-full p-4 border-2 rounded-2xl mt-2 text-xl font-bold uppercase"></div>
            <div><label class="text-gray-400 font-bold text-xs uppercase">Pilot Name</label><input type="text" id="new-pilot-name" placeholder="Pilot Name" class="w-full p-4 border-2 rounded-2xl mt-2 text-xl font-bold"></div>
            <div><label class="text-gray-400 font-bold text-xs uppercase">Pilot Mobile</label><input type="tel" id="new-pilot-phone" placeholder="Mobile No" class="w-full p-4 border-2 rounded-2xl mt-2 text-xl font-bold"></div>
            <div class="bg-blue-50 p-6 rounded-[30px] border-2 border-blue-100">
                <p class="font-black text-blue-900">Invite Pilot</p>
                <button onclick="sendWhatsAppInvite()" class="w-full bg-green-600 text-white py-4 rounded-xl mt-4 font-black shadow-lg">💬 WHATSAPP INVITE</button>
            </div>
            <button onclick="saveAndGoToDash()" class="w-full bg-blue-800 text-white py-5 rounded-[30px] font-black text-xl shadow-xl">SAVE FLEET</button>
        </div>
    </div>

    <div id="screen-owner" class="screen h-screen overflow-hidden">
        <header class="bg-white p-5 flex justify-between items-center border-b">
            <h2 class="text-2xl font-black italic text-blue-900 tracking-tighter">LOADIFY CONTROL</h2>
            <button onclick="showScreen('onboarding')" class="text-blue-800 text-3xl font-bold">+</button>
        </header>
        <main class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="flex justify-between font-bold text-[10px] px-2 text-gray-400 uppercase tracking-widest">
                <span id="count-text">0 Trucks</span><span id="moving-text" class="text-green-600">0 Moving</span><span>₹18,200 Today</span>
            </div>
            <div id="map-mobile" class="shadow-xl"></div>
            <div id="truck-cards-container" class="space-y-4 pb-24"></div>
        </main>
        <nav class="bg-white border-t flex justify-around p-4 fixed bottom-0 w-full z-50 shadow-2xl">
            <div class="active-tab text-center px-4"><span class="text-2xl">📊</span><p class="text-[10px] font-bold">Dash</p></div>
            <div class="text-gray-300 text-center px-4"><span class="text-2xl">🚚</span><p class="text-[10px] font-bold">Trips</p></div>
            <div class="text-gray-300 text-center px-4"><span class="text-2xl">📈</span><p class="text-[10px] font-bold">Insights</p></div>
        </nav>
    </div>

    <div id="screen-driver" class="screen bg-gray-50">
        <header class="p-6 text-center font-black text-blue-900 text-xl border-b bg-white italic">PILOT CONSOLE</header>
        <div class="p-8 space-y-8 flex-1 flex flex-col justify-center">
            <div class="bg-white p-8 rounded-[40px] shadow-2xl border-2 text-center">
                <p class="text-gray-400 font-bold uppercase text-xs">Active Trip</p>
                <h3 class="text-4xl font-black my-4 text-blue-900">WB26-X0606</h3>
                <div class="bg-green-50 p-4 rounded-2xl"><span class="text-2xl font-black text-green-600">₹12,000</span></div>
            </div>
            <button id="trip-btn" onclick="toggleTrip()" class="w-full bg-blue-800 text-white py-8 rounded-[40px] font-black text-3xl shadow-2xl transition-all">START TRIP</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API = "https://loadifyindia.onrender.com";
        let role = 'owner';
        let map = null;
        let isTracking = false;

        function setRole(r) {
            role = r;
            document.getElementById('role-owner').className = r === 'owner' ? "flex-1 p-4 rounded-xl border-2 font-black bg-blue-800 text-white border-blue-800" : "flex-1 p-4 rounded-xl border-2 font-black bg-gray-50 text-gray-400 border-gray-200";
            document.getElementById('role-driver').className = r === 'driver' ? "flex-1 p-4 rounded-xl border-2 font-black bg-blue-800 text-white border-blue-800" : "flex-1 p-4 rounded-xl border-2 font-black bg-gray-50 text-gray-400 border-gray-200";
        }

        async function processLogin() {
            const ph = document.getElementById('login-phone').value;
            if(!ph) return alert("Enter Mobile Number");
            if(role === 'driver') return showScreen('driver');
            
            try {
                const res = await fetch(`${API}/dashboard`);
                const data = await res.json();
                if(data.length === 0) showScreen('onboarding');
                else { showScreen('owner'); initMap(); }
            } catch(e) { showScreen('onboarding'); }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('screen-active'));
            document.getElementById('screen-' + id).classList.add('screen-active');
        }

        function initMap() {
            if(!map) {
                map = L.map('map-mobile', {zoomControl: false}).setView([22.5, 88.3], 6);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            refreshFleet();
            setInterval(refreshFleet, 10000);
        }

        async function refreshFleet() {
            try {
                const res = await fetch(`${API}/dashboard`);
                const data = await res.json();
                document.getElementById('count-text').innerText = `${data.length} Trucks`;
                document.getElementById('moving-text').innerText = `${data.filter(t => t.speed > 5).length} Moving`;
                
                const container = document.getElementById('truck-cards-container');
                container.innerHTML = '';
                data.forEach(t => {
                    container.innerHTML += `
                    <div class="bg-white p-5 rounded-[32px] border shadow-sm mb-4" onclick="focusM(${t.lat}, ${t.lng})">
                        <div class="flex justify-between items-start">
                            <div><h4 class="font-black text-xl text-blue-900">${t.truck_id}</h4><p class="text-xs font-bold ${t.speed > 5 ? 'text-green-500' : 'text-red-500'}">● ${t.speed > 5 ? 'Moving' : 'Stopped'}</p></div>
                            <div class="flex space-x-2">
                                <a href="tel:9874076688" onclick="event.stopPropagation()" class="bg-gray-100 p-3 rounded-2xl font-bold text-[10px]">📞 CALL</a>
                                <a href="sms:9874076688" onclick="event.stopPropagation()" class="bg-gray-100 p-3 rounded-2xl font-bold text-[10px]">✉️ MSG</a>
                            </div>
                        </div>
                        <div class="mt-4 flex justify-between text-xs font-bold text-gray-400"><span>Speed: ${t.speed} KM/H</span><span class="text-blue-900">₹12,000 trip</span></div>
                    </div>`;
                });
            } catch(e) {}
        }

        function focusM(lat, lng) { if(map) map.setView([lat, lng], 14); }
        function sendWhatsAppInvite() { 
            const p = document.getElementById('new-pilot-phone').value;
            window.open(`https://wa.me/91${p}?text=Loadify India: Track here: ${window.location.href}`); 
        }
        function saveAndGoToDash() { alert("Saved!"); showScreen('owner'); initMap(); }

        function toggleTrip() {
            isTracking = !isTracking;
            const btn = document.getElementById('trip-btn');
            if(isTracking) {
                btn.innerText = "FINISH TRIP";
                btn.style.background = "red";
                navigator.geolocation.watchPosition(p => {
                    fetch(`${API}/send-location`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ truck_id: "WB26-X0606", lat: p.coords.latitude, lng: p.coords.longitude, speed: p.coords.speed || 0 })
                    });
                }, null, {enableHighAccuracy: true});
            } else { location.reload(); }
        }
    </script>
</body>
</html>
