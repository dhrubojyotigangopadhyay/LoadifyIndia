<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadify India | Fleet Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <div class="header">
            <img src="inverted-logo.svg" alt="Loadify Logo" class="main-logo">
            <p id="fleet-stat">Fleet Status: <span id="truck-count">0</span> Active</p>
        </div>
        
        <div class="registration-box">
            <input type="text" id="truck-no" placeholder="Truck No (e.g. WB23-5566)">
            <input type="text" id="driver-ph" placeholder="Driver Phone">
            <button onclick="registerTruck()">Add & Invite</button>
        </div>

        <div id="truck-list"></div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
