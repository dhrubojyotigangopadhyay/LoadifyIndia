    <rect x="10" y="30" width="40" height="20" rx="4"></rect>
    <rect x="45" y="35" width="15" height="15" rx="2"></rect>
    <circle cx="25" cy="55" r="5" fill="#111111"></circle>
    <circle cx="50" cy="55" r="5" fill="#111111"></circle>
