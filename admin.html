// Replace the <script> in loadify-admin.html with this integrated logic
const API = 'https://loadifyindia.onrender.com';

async function syncAdmin() {
    try {
        const res = await fetch(`${API}/dashboard`);
        const data = await res.json();
        
        // Update Stat Cards
        document.querySelector('.stat-card.blue .stat-card-val').textContent = data.length;
        document.querySelector('.stat-card.green .stat-card-val').textContent = data.filter(t => t.speed > 5).length;
        
        // Update All Owners Table
        const tbody = document.getElementById('all-owners-tbody');
        tbody.innerHTML = data.map(truck => `
            <tr>
                <td><input type="checkbox"></td>
                <td class="td-name">${truck.truck_id}</td>
                <td><span class="badge active">PILOT ACTIVE</span></td>
                <td>${truck.speed} KM/H</td>
                <td class="font-bold text-blue-900">${truck.status}</td>
            </tr>
        `).join('');
    } catch (e) { console.error("Admin Sync Error"); }
}

function switchNav(panel, el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + panel).classList.add('active');
}

window.onload = () => { syncAdmin(); setInterval(syncAdmin, 10000); };
